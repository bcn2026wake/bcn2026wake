AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  BCN 2026 Wake — serverless backend. A DynamoDB participant roster and Lambda
  handlers for ID-based login and the role-based contact directory. Designed to
  sit comfortably inside the AWS free tier for a 1-week, 400-500 user event.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Architectures: [arm64]

Resources:
  ParticipantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Participants
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: team_id
          AttributeType: S
        - AttributeName: room_id
          AttributeType: S
        - AttributeName: role
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: byTeam
          KeySchema:
            - AttributeName: team_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: byRoom
          KeySchema:
            - AttributeName: room_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: byRole
          KeySchema:
            - AttributeName: role
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,GET,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  LoginFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: login.lambda_handler
      CodeUri: lambda/
      Environment:
        Variables:
          ATTENDEES_TABLE: !Ref ParticipantsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !GetAtt ParticipantsTable.Arn
                - !Sub '${ParticipantsTable.Arn}/index/*'
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /login
            Method: get

  ContactsFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: contacts.lambda_handler
      CodeUri: lambda/
      Environment:
        Variables:
          ATTENDEES_TABLE: !Ref ParticipantsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:BatchGetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt ParticipantsTable.Arn
                - !Sub '${ParticipantsTable.Arn}/index/*'
      Events:
        Contacts:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /contacts
            Method: get

  UpdateProfileFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update_profile.lambda_handler
      CodeUri: lambda/
      Environment:
        Variables:
          ATTENDEES_TABLE: !Ref ParticipantsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt ParticipantsTable.Arn
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /profile
            Method: put

Outputs:
  ApiBaseUrl:
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod'
  ParticipantsTable:
    Value: !Ref ParticipantsTable
